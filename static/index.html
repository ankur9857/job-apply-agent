<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>JobBot Agent 🤖</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --card: #1a1a24;
    --accent: #00f5a0;
    --accent2: #00b4ff;
    --danger: #ff4d6d;
    --warn: #ffbe0b;
    --text: #e8e8f0;
    --muted: #6b6b80;
    --border: #2a2a38;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; }
  .phone { max-width: 430px; margin: 0 auto; min-height: 100vh; position: relative; }
  .status-bar { display: flex; justify-content: space-between; padding: 12px 20px 8px; font-size: 11px; font-weight: 600; }
  .header { padding: 10px 20px 20px; }
  .logo { font-family: 'Syne', sans-serif; font-size: 24px; font-weight: 800; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 4px; }
  .subtitle { font-size: 13px; color: var(--muted); }
  .tabs { display: flex; gap: 8px; padding: 0 20px 16px; overflow-x: auto; }
  .tab { padding: 8px 16px; border-radius: 20px; font-size: 13px; font-weight: 600; cursor: pointer; border: 1px solid var(--border); background: var(--card); color: var(--muted); white-space: nowrap; transition: all 0.2s; }
  .tab.active { background: linear-gradient(135deg, var(--accent)22, var(--accent2)22); border-color: var(--accent)44; color: var(--accent); }
  .page { display: none; padding: 0 20px; }
  .page.active { display: block; }
  .form-card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 18px; margin-bottom: 14px; }
  .form-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 16px; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
  .input-group { margin-bottom: 12px; }
  .input-label { font-size: 11px; color: var(--muted); margin-bottom: 5px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
  .input-field { width: 100%; background: var(--surface); border: 1px solid var(--border); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; padding: 11px 14px; border-radius: 12px; outline: none; transition: border-color 0.2s; }
  .input-field:focus { border-color: var(--accent)66; }
  .btn-primary { width: 100%; background: linear-gradient(135deg, var(--accent), var(--accent2)); border: none; color: #000; font-family: 'Syne', sans-serif; font-weight: 800; font-size: 15px; padding: 15px; border-radius: 16px; cursor: pointer; transition: all 0.2s; margin-top: 6px; }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-secondary { width: 100%; background: var(--surface); border: 1px solid var(--border); color: var(--text); font-family: 'DM Sans', sans-serif; font-weight: 600; font-size: 14px; padding: 12px; border-radius: 14px; cursor: pointer; margin-top: 8px; }
  .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 16px; }
  .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 14px 10px; text-align: center; position: relative; overflow: hidden; }
  .stat-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; }
  .stat-card.green::before { background: var(--accent); }
  .stat-card.blue::before { background: var(--accent2); }
  .stat-card.yellow::before { background: var(--warn); }
  .stat-num { font-family: 'Syne', sans-serif; font-size: 26px; font-weight: 800; }
  .stat-card.green .stat-num { color: var(--accent); }
  .stat-card.blue .stat-num { color: var(--accent2); }
  .stat-card.yellow .stat-num { color: var(--warn); }
  .stat-label { font-size: 10px; color: var(--muted); margin-top: 2px; }
  .job-card { background: var(--card); border: 1px solid var(--border); border-radius: 18px; padding: 16px; margin-bottom: 12px; position: relative; overflow: hidden; }
  .job-card::after { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: var(--accent); border-radius: 3px 0 0 3px; }
  .job-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 10px; }
  .job-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 14px; margin-bottom: 2px; }
  .company-name { font-size: 12px; color: var(--muted); }
  .match-badge { background: var(--accent)22; color: var(--accent); font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 20px; white-space: nowrap; }
  .job-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
  .tag { background: var(--surface); border: 1px solid var(--border); color: var(--muted); font-size: 10px; padding: 3px 8px; border-radius: 6px; }
  .salary-tag { color: var(--warn); border-color: var(--warn)44; background: var(--warn)11; }
